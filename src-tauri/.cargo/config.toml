[build]
# 使用全部 16 个 CPU 核心并行编译
jobs = 16

# 使用 rust-lld 加速链接（比 MSVC link.exe 快数倍）
[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"
rustflags = ["-C", "link-arg=/DEBUG:NONE", "-C", "link-arg=/OPT:REF", "-C", "link-arg=/OPT:ICF"]

[profile.dev]
# 零优化 = 最快编译速度
opt-level = 0
# 增量编译
incremental = true
# 最大并行代码生成单元
codegen-units = 256
# 不生成调试信息（减少 I/O）
debug = 0
# 不做 LTO
lto = "off"
# 不 strip（Windows 不需要）
strip = "none"

[profile.dev.package."*"]
# 依赖包也不优化，统一编译速度
opt-level = 0
codegen-units = 256

[profile.release]
# Release 保持性能
opt-level = 3
lto = "thin"
codegen-units = 16
strip = "symbols"
