        title: { type: string, minLength: 1, maxLength: 500 }
        preview: { type: string }
        source: { type: string }
        model: { type: string }
        messageCount: { type: integer, minimum: 0 }
        archived: { type: boolean }
        revision:
          type: string
          description: Unquoted strong revision for the complete single-session representation.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        match: { oneOf: [{ $ref: "#/components/schemas/SearchMatch" }, { type: "null" }] }
    SearchMatch:
      type: object
      additionalProperties: false
      required: [field, messageId, snippet, ranges]
      properties:
        field: { type: string, enum: [title, id, message] }
        messageId:
          type: [string, "null"]
          description: Non-null only when field is message; null for title and ID matches.
        snippet: { type: string }
        ranges:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [start, end]
            properties:
              start: { type: integer, minimum: 0 }
              end: { type: integer, minimum: 0 }
    CreateSession:
      type: object
      additionalProperties: false
      required: [profileId]
      properties:
        profileId: { $ref: "#/components/schemas/ProfileIdValue" }
        personaId:
          type: [string, "null"]
          pattern: '^persona_[0-9a-f]{32}$'
          description: Optional persistent default Persona. The create operation validates only the opaque identifier syntax; Run preparation validates Profile-scoped existence.
        title:
          type: [string, "null"]
          minLength: 1
          maxLength: 500
          description: Null or omission asks the backend to generate the initial title.
    SessionPatch:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        title: { type: string, minLength: 1, maxLength: 500 }
        archived: { type: boolean }
    SessionPage:
      type: object
      additionalProperties: false
      required: [items, nextCursor]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/Session" } }
        nextCursor: { type: [string, "null"] }
    TextPart:
      type: object
      additionalProperties: false
      required: [type, text]
      properties:
        type: { type: string, const: text }
        text: { type: string }
    FilePart:
      type: object
      additionalProperties: false
      required: [type, fileId, name, mimeType]
      properties:
        type: { type: string, const: file }
        fileId: { type: string }
        name: { type: string }
        mimeType: { type: string }
    Message:
      type: object
      additionalProperties: false
      description: Public persisted message projection. Tool-role text and toolCalls contain only redacted summaries; raw tool arguments and results stay in the internal execution journal.
      required: [id, sessionId, sequence, role, parts, reasoning, toolCalls, usage, createdAt]
      properties:
        id: { type: string }
        sessionId: { type: string }
        sequence:
          type: integer
          minimum: 1
          description: Immutable, strictly increasing within this session; unrelated to Run event sequence.
        role: { type: string, enum: [user, assistant, system, tool] }
        parts:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/TextPart"
              - $ref: "#/components/schemas/FilePart"
        reasoning: { type: [string, "null"] }
        toolCalls: { type: array, items: { $ref: "#/components/schemas/ToolCall" } }
        usage: { oneOf: [{ $ref: "#/components/schemas/Usage" }, { type: "null" }] }
        createdAt: { type: string, format: date-time }
    ToolCall:
      type: object
      additionalProperties: false
      description: Public lifecycle projection for one tool invocation. It never contains raw arguments, raw results, stdout or stderr.
      required: [callId, name, status]
      properties:
        callId: { type: string }
        name: { type: string }
        status: { type: string, enum: [unknown, running, completed, failed, cancelled] }
        inputSummary: { type: [string, "null"], maxLength: 2000, description: "Redacted bounded summary, never raw arguments." }
        resultSummary: { type: [string, "null"], maxLength: 8000, description: "Redacted bounded summary, never a raw tool result." }
        artifacts: { type: array, items: { $ref: "#/components/schemas/FileRef" } }
    MessagePage:
      type: object
      additionalProperties: false
      required: [items, nextCursor, snapshotLastSequence, firstSequence, lastSequence]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/Message" } }
        nextCursor: { type: [string, "null"] }
        snapshotLastSequence:
          type: integer
          minimum: 0
          description: Highest committed message sequence captured by the cursor chain; zero for an empty session.
        firstSequence:
          type: [integer, "null"]
          minimum: 1
          description: First sequence in items, or null for an empty page.
        lastSequence:
          type: [integer, "null"]
          minimum: 1
          description: Last sequence in items, or null for an empty page.
    HermesImportWarning:
      type: object
      additionalProperties: false
      required: [code, count]
      properties:
        code: { type: string, minLength: 1, maxLength: 128 }
        count: { type: integer, minimum: 1 }
    HermesImportPreview:
      type: object
      additionalProperties: false
      required: [state, adapterId, referenceCommit, schemaVersion, snapshotFingerprint, sessionCount, messageCount, modelUsageRowCount, attachmentCount, rewoundMessageCount, warnings, warningsDropped]
      properties:
        state: { type: string, enum: [absent, ready] }
        adapterId: { type: string, const: hermes-agent-state-v21 }
        referenceCommit: { type: string, minLength: 40, maxLength: 64 }
        schemaVersion: { type: [integer, "null"], minimum: 1 }
        snapshotFingerprint: { type: [string, "null"], pattern: "^[0-9a-f]{64}$" }
        sessionCount: { type: [integer, "null"], minimum: 0 }
        messageCount: { type: [integer, "null"], minimum: 0 }
        modelUsageRowCount: { type: [integer, "null"], minimum: 0 }
        attachmentCount: { type: [integer, "null"], minimum: 0 }
        rewoundMessageCount: { type: [integer, "null"], minimum: 0 }
        warnings: { type: array, maxItems: 256, items: { $ref: "#/components/schemas/HermesImportWarning" } }
        warningsDropped: { type: integer, minimum: 0 }
    HermesImportRequest:
      type: object
      additionalProperties: false
      required: [expectedSnapshotFingerprint, allowAttachmentOmission]
      properties:
        expectedSnapshotFingerprint: { type: string, pattern: "^[0-9a-f]{64}$" }
        allowAttachmentOmission: { type: boolean }
    HermesImportResult:
      type: object
      additionalProperties: false
      required: [importId, profileId, disposition, adapterId, referenceCommit, sourceSchemaVersion, snapshotFingerprint, importedSessionCount, importedMessageCount, importedModelUsageRowCount, omittedAttachmentCount, warnings, warningsDropped]
      properties:
        importId: { type: string }
        profileId: { $ref: "#/components/schemas/ProfileIdValue" }
        disposition: { type: string, enum: [imported, unchanged, replayed] }
        adapterId: { type: string, const: hermes-agent-state-v21 }
        referenceCommit: { type: string, minLength: 40, maxLength: 64 }
        sourceSchemaVersion: { type: integer, const: 21 }
        snapshotFingerprint: { type: string, pattern: "^[0-9a-f]{64}$" }
        importedSessionCount: { type: integer, minimum: 0 }
        importedMessageCount: { type: integer, minimum: 0 }
        importedModelUsageRowCount: { type: integer, minimum: 0 }
        omittedAttachmentCount: { type: integer, minimum: 0 }
        warnings: { type: array, maxItems: 256, items: { $ref: "#/components/schemas/HermesImportWarning" } }
        warningsDropped: { type: integer, minimum: 0 }
    HermesImportConflict:
      type: object
      additionalProperties: false
      required: [code, sourceKeyDigest, targetSessionId]
      properties:
        code: { type: string, enum: [sourceRemoved, sourceChanged, sourceExtended, targetDeleted, targetModified] }
        sourceKeyDigest: { type: string, pattern: "^[0-9a-f]{64}$" }
        targetSessionId: { type: [string, "null"] }
    HermesImportConflictProblem:
      type: object
      additionalProperties: false
      required: [type, title, status, detail, instance, code, requestId, retryable, conflictCount, conflicts, conflictsDropped]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer, const: 409 }
        detail: { type: string }
        instance: { type: string }
        code: { type: string, const: hermes_import_conflict }
        requestId: { type: string }
        retryable: { type: boolean, const: false }
        conflictCount: { type: integer, minimum: 1 }
        conflicts: { type: array, maxItems: 64, items: { $ref: "#/components/schemas/HermesImportConflict" } }
        conflictsDropped: { type: integer, minimum: 0 }
    FileRef:
      type: object
      additionalProperties: false
      required: [id, name, mimeType, sizeBytes, createdAt]
      properties:
        id: { type: string, pattern: '^file_[0-9a-f]{32}$' }
        name: { type: string, minLength: 1, maxLength: 255 }
        mimeType: { type: string, enum: [application/json, application/octet-stream, application/pdf, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.openxmlformats-officedocument.wordprocessingml.document, application/x-zip-compressed, application/yaml, application/zip, image/gif, image/jpeg, image/png, image/webp, text/csv, text/markdown, text/plain, text/tab-separated-values, text/yaml] }
        sizeBytes: { type: integer, minimum: 0, maximum: 8388608 }
        createdAt: { type: string, format: date-time }
    ChatInput:
      type: object
      additionalProperties: false
      required: [text, fileIds]
      properties:
        text: { type: string, maxLength: 1000000 }
        fileIds: { type: array, maxItems: 20, items: { type: string } }
    CreateRun:
      type: object
      additionalProperties: false
      required: [clientRequestId, message]
      properties:
        clientRequestId: { type: string, minLength: 1, maxLength: 128 }
        message: { $ref: "#/components/schemas/ChatInput" }
        personaId:
          type: [string, "null"]
          pattern: '^persona_[0-9a-f]{32}$'
          description: Optional Persona from the Session Profile. Its bounded prompt fields and enabled bound Worldbook sections are injected as system context. It also controls Persona model, tool and memory policy for this Run.
        modelOverride: { oneOf: [{ $ref: "#/components/schemas/ModelConfig" }, { type: "null" }] }
        reasoningEffort: { type: [string, "null"], enum: [minimal, low, medium, high, xhigh, null] }
        workspaceId:
          type: [string, "null"]
          description: Optional opaque Profile-scoped root snapshot for this Run. No path is accepted here.
    Run:
      type: object
      additionalProperties: false
      required: [id, sessionId, profileId, status, lastSequence, messageId, usage, error, pendingAction, createdAt, updatedAt]
      properties:
        id: { type: string }
        sessionId: { type: string }
        profileId: { type: string }
        status: { type: string, enum: [queued, running, waitingApproval, waitingClarification, cancelling, completed, cancelled, failed] }
        lastSequence: { type: integer, minimum: 0, description: "Last allocated SSE sequence, or 0 before the first event." }
        messageId: { type: [string, "null"] }
        usage: { oneOf: [{ $ref: "#/components/schemas/Usage" }, { type: "null" }] }
        error: { oneOf: [{ $ref: "#/components/schemas/Problem" }, { type: "null" }] }
        pendingAction:
          description: The currently outstanding approval or clarification. It is non-null exactly while status is waitingApproval or waitingClarification, allowing recovery after an SSE replay window expires.
          oneOf:
            - $ref: "#/components/schemas/PendingApprovalAction"
            - $ref: "#/components/schemas/PendingClarificationAction"
            - type: "null"
          x-status-invariant:
            waitingApproval: PendingApprovalAction
            waitingClarification: PendingClarificationAction
            allOtherStatuses: null
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ActiveRun:
      type: object
      additionalProperties: false
      description: Recovery projection captured atomically with its user Message and current Session revision. queueItemId is non-null exactly for a queued Run.
      required: [run, queueItemId, userMessage, sessionRevision]
      properties:
        run: { $ref: "#/components/schemas/Run" }
        queueItemId: { type: [string, "null"], pattern: '^queue_[0-9a-f]{32}$' }
        userMessage: { $ref: "#/components/schemas/Message" }
        sessionRevision: { type: string, minLength: 1, maxLength: 126 }
    ActiveRunList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          maxItems: 16
          description: Non-terminal Runs ordered by createdAt ascending and Run ID ascending.
          items: { $ref: "#/components/schemas/ActiveRun" }
    RunAccepted:
      type: object
      description: When extensions.runQueue=true, a second non-terminal Run for the same Session durably stores its user Message and opaque queue item in the same transaction and starts only after the preceding Run is terminal.
      additionalProperties: false
      required: [run, disposition, queueItemId, userMessage, sessionRevision]
      properties:
        run: { $ref: "#/components/schemas/Run" }
        disposition: { type: string, enum: [started, queued, replayed] }
        queueItemId: { type: [string, "null"] }
        userMessage: { $ref: "#/components/schemas/Message" }
        sessionRevision:
          type: string
          description: Current unquoted Session revision after the user Message transaction, or the current revision when replayed.
      oneOf:
        - title: Started immediately
          properties:
            disposition: { const: started }
            queueItemId: { type: "null" }
            run:
              allOf:
                - $ref: "#/components/schemas/Run"
                - type: object
                  properties:
                    status: { const: running }
        - title: Queued
          properties:
            disposition: { const: queued }
            queueItemId: { type: string, minLength: 1 }
            run:
              allOf:
                - $ref: "#/components/schemas/Run"
                - type: object
                  properties:
                    status: { const: queued }
        - title: Idempotent replay
          properties:
            disposition: { const: replayed }
            run: { $ref: "#/components/schemas/Run" }
    PendingApprovalAction:
      type: object
      additionalProperties: false
      description: Durable recovery projection for the one outstanding approval. It contains only a redacted bounded summary; raw tool arguments remain in the internal execution journal.
      required: [kind, approvalId, callId, toolName, inputSummary, choices, expiresAt]
      properties:
        kind: { type: string, const: approval }
        approvalId: { type: string }
        callId: { type: string }
        toolName: { type: string }
        inputSummary: { type: [string, "null"], maxLength: 2000, description: Required nullable field containing only a redacted summary. }
        choices:
          type: array
          minItems: 1
          uniqueItems: true
          description: The submitted decision must be a member of this exact array. Initial dangerous-tool approvals expose exactly once and deny.
          x-current-dangerous-tool-choices: [once, deny]
          items: { type: string, enum: [once, session, always, deny] }
        expiresAt: { type: string, format: date-time }
    PendingClarificationAction:
      type: object
      additionalProperties: false
      required: [kind, requestId, question, choices]
      properties:
        kind: { type: string, const: clarification }
        requestId: { type: string }
        question: { type: string, minLength: 1, maxLength: 2000 }
        choices:
          type: array
          minItems: 0
          maxItems: 4
          uniqueItems: true
          description: Zero to four distinct selectable answers. Empty means the answer is free-form.
          items: { type: string, minLength: 1, maxLength: 500 }
    ApprovalDecision:
      type: object
      additionalProperties: false
      description: The decision must be present in the outstanding PendingApprovalAction choices. Identical normalized payloads are durably idempotent; a different replay conflicts.
      required: [decision]
      properties:
        decision: { type: string, enum: [once, session, always, deny] }
        reason: { type: [string, "null"], maxLength: 2000 }
    ClarificationAnswer:
      type: object
      additionalProperties: false
      required: [answer]
      properties:
        answer: { type: string, minLength: 1, maxLength: 10000 }
    ActionAccepted:
      type: object
      additionalProperties: false
      required: [accepted]
      properties:
        accepted: { type: boolean, const: true }
    Workspace:
      type: object
      additionalProperties: false
      required: [id, profileId, displayName, available, createdAt, updatedAt]
      properties:
        id: { type: string, pattern: '^workspace_[A-Za-z0-9_]+$' }
        profileId: { $ref: "#/components/schemas/ProfileIdValue" }
        displayName: { type: string, minLength: 1, maxLength: 500 }
        available: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    RegisterWorkspace:
      type: object
      additionalProperties: false
      required: [path]
      description: Desktop-local write-only path input. Responses and logs never echo this value.
      properties:
        path: { type: string, minLength: 1, maxLength: 16384 }
    Toolset:
      type: object
      additionalProperties: false
      required: [id, displayName, description, enabled, configured, tools]
      properties:
        id: { type: string }
        displayName: { type: string }
        description: { type: string }
        enabled: { type: boolean }
        configured:
          type: boolean
          description: >-
            Whether this installation currently satisfies the Toolset's local
            configuration prerequisite. For code_execution this means a usable
            host Python 3 interpreter was detected; callers must still require
            capabilities.extensions.codeExecution=true and enabled=true before
            presenting execute_code as runnable.
        tools: { type: array, items: { type: string } }
        configSchema: { type: object, additionalProperties: true }
    ToolsetPatch:
      type: object
      additionalProperties: false
      required: [enabled]
      description: Exact enablement update. General Toolset configuration is unavailable until a bounded, secret-safe configuration model is defined.
      properties:
        enabled: { type: boolean }
    Skill:
      type: object
      additionalProperties: false
      required: [id, name, description, source, enabled, uninstallable, configurable]
      properties:
        id: { type: string, pattern: '^skill_[0-9a-f]{32}$' }
        name: { type: string }
        description: { type: string }
        source: { type: string, enum: [bundled, file, local, registry, url] }
        version: { type: [string, "null"] }
        enabled: { type: boolean }
        uninstallable: { type: boolean }
        configurable: { type: boolean }
        configSchema: { type: object, additionalProperties: true }
    SkillPage:
      type: object
      additionalProperties: false
      required: [items, nextCursor]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/Skill" } }
        nextCursor: { type: [string, "null"] }
    InstallSkill:
      type: object
      additionalProperties: false
      properties:
        registryId: { type: string, minLength: 1, maxLength: 512 }
        url:
          type: string
          format: uri
          pattern: '^https://.*/SKILL\.md$'
          minLength: 1
          maxLength: 2048
          description: Direct public HTTPS SKILL.md URL. Userinfo, percent escapes, query, fragment, redirects to unsafe hosts, and every private or special resolved address are rejected.
        fileId: { type: string, pattern: '^file_[0-9a-f]{32}$' }
      oneOf:
        - required: [registryId]
        - required: [url]
        - required: [fileId]
    SkillPatch:
      type: object
      additionalProperties: false
      properties:
        enabled: { type: boolean }
        config: { type: object, additionalProperties: true }
    Operation:
      type: object
      additionalProperties: false
      required: [id, kind, status, createdAt, updatedAt]
      properties:
        id: { type: string, pattern: '^op_[0-9a-f]{32}$' }
        kind: { type: string, enum: [skillInstall, skillUninstall] }
        status: { type: string, enum: [queued, running, completed, failed, cancelled] }
        error: { oneOf: [{ $ref: "#/components/schemas/Problem" }, { type: "null" }] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    MemoryCapabilities:
      type: object
      additionalProperties: false
      required: [create, update, delete, search]
      properties:
        create: { type: boolean, description: Whether direct authenticated REST creation is available for this builtin target. }
        update: { type: boolean, description: Whether direct authenticated REST replacement is available for this builtin target. }
        delete: { type: boolean, description: Whether direct authenticated REST deletion is available for this builtin target. }
        search: { type: boolean, description: Whether q filtering is available for this builtin target. }
    Memory:
      type: object
      additionalProperties: false
      required: [id, target, content, provider]
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 512
          description: Opaque identifier valid only for this target revision. Any revision change invalidates every previously returned Memory.id.
        target: { type: string, enum: [memory, user] }
        content: { type: string, minLength: 1, maxLength: 2200 }
        provider: { type: string, const: builtin }
    MemoryPage:
      type: object
      additionalProperties: false
      required: [items, nextCursor, revision, provider, charsUsed, charLimit, promptSafety, capabilities]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/Memory" } }
        nextCursor:
          type: [string, "null"]
          description: Opaque continuation bound to profile, target, q, limit and revision. It never embeds memory content.
        revision:
          type: string
          minLength: 1
          description: Unquoted strong target revision corresponding to the response ETag. Every item ID is scoped to this value.
        provider: { type: string, const: builtin }
        charsUsed:
          type: integer
          minimum: 0
          description: Character count of the complete canonical target, including entry delimiters; independent of q and pagination.
        charLimit:
          type: integer
          minimum: 1
          description: Authoritative configured character budget for the complete target; independent of q and pagination.
        promptSafety:
          type: string
          enum: [clean, blocked]
          description: Blocked means at least one on-disk entry failed strict threat scanning and is excluded from the frozen prompt snapshot until removed or replaced.
        capabilities: { $ref: "#/components/schemas/MemoryCapabilities" }
    CreateMemory:
      type: object
      additionalProperties: false
      required: [target, content]
      properties:
        target: { type: string, enum: [memory, user] }
        content:
          type: string
          minLength: 1
          maxLength: 2200
          description: One entry. The complete target after normalization and delimiter serialization must not exceed its MemoryPage.charLimit.
    MemoryPatch:
      type: object
      additionalProperties: false
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 2200
          description: Complete replacement for one entry. The complete target after replacement must not exceed its MemoryPage.charLimit.
    McpServer:
      type: object
      additionalProperties: false
      description: Profile-scoped persistent configuration. Each transport supports runtime discovery and Run tool injection only when mcpManagement and its corresponding mcpStdio, mcpStreamableHttp or mcpSse extension flag are true.
      required: [id, name, transport, command, args, url, enabled, timeoutSeconds, envSecretNames, bearerTokenSecretName, missingSecretNames]
      properties:
        id: { type: string, pattern: '^mcp_[0-9a-f]{32}$' }
        name: { $ref: "#/components/schemas/McpServerName" }
        transport: { type: string, enum: [stdio, streamableHttp, sse] }
        command:
          type: [string, "null"]
          minLength: 1
          maxLength: 1024
          description: Direct executable path/name for stdio, never a shell command string. Null for remote transports.
        args: { $ref: "#/components/schemas/McpArgs" }
        url:
          oneOf:
            - $ref: "#/components/schemas/McpRemoteUrl"
            - type: "null"
        enabled: { type: boolean }
        timeoutSeconds: { type: integer, minimum: 1, maximum: 600 }
        envSecretNames: { $ref: "#/components/schemas/McpSecretNameList" }
        bearerTokenSecretName:
          oneOf:
            - $ref: "#/components/schemas/McpSecretName"
            - type: "null"
        missingSecretNames:
          allOf:
            - $ref: "#/components/schemas/McpSecretNameList"
          description: Referenced names currently absent from the Profile OS keychain. Legal unconfigured references remain persistable; values are never returned.
    McpServerName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: '^[A-Za-z0-9][A-Za-z0-9_-]{0,63}$'
    McpSecretName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: '^[A-Z][A-Z0-9_]{0,127}$'
    McpSecretNameList:
      type: array
      maxItems: 32
      uniqueItems: true
      items: { $ref: "#/components/schemas/McpSecretName" }
    McpArgs:
      type: array
      maxItems: 64
      description: Ordered direct-process argv; each item is at most 2048 bytes and the UTF-8 aggregate is at most 16 KiB. Sensitive option/assignment names are rejected; use envSecretNames instead.
      items: { type: string, maxLength: 2048 }
    McpRemoteUrl:
      type: string
      format: uri
      minLength: 1
      maxLength: 2048
      description: HTTPS without userinfo/query/fragment, except HTTP is permitted for loopback only. Literal private, metadata, link-local, multicast and unspecified addresses are rejected. Runtime repeats all-address DNS validation, pins each request to validated addresses and manually validates every redirect. Bearer and session headers are origin-bound.
    CreateMcpServer:
      discriminator:
        propertyName: transport
      oneOf:
        - title: Standard I/O server
          type: object
          additionalProperties: false
          required: [name, transport, command, args, enabled, timeoutSeconds, envSecretNames]
          properties:
            name: { $ref: "#/components/schemas/McpServerName" }
            transport: { type: string, const: stdio }
            command:
              type: string
              minLength: 1
              maxLength: 1024
              description: Direct executable only. Shell interpreters, control characters, shell metacharacters and embedded bare-command arguments are rejected.
            args: { $ref: "#/components/schemas/McpArgs" }
            enabled: { type: boolean }
            timeoutSeconds: { type: integer, minimum: 1, maximum: 600 }
            envSecretNames:
              allOf:
                - $ref: "#/components/schemas/McpSecretNameList"
              description: Exact environment variable names to inject from the Profile keychain. No ambient process environment is inherited.
        - title: Streamable HTTP server
          type: object
          additionalProperties: false
          required: [name, transport, url, enabled, timeoutSeconds]
          properties:
            name: { $ref: "#/components/schemas/McpServerName" }
            transport: { type: string, const: streamableHttp }
            url: { $ref: "#/components/schemas/McpRemoteUrl" }
            enabled: { type: boolean }
            timeoutSeconds: { type: integer, minimum: 1, maximum: 600 }
            bearerTokenSecretName: { $ref: "#/components/schemas/McpSecretName" }
        - title: Legacy SSE server
          type: object
          additionalProperties: false
          required: [name, transport, url, enabled, timeoutSeconds]
          properties:
            name: { $ref: "#/components/schemas/McpServerName" }
            transport: { type: string, const: sse }
            url: { $ref: "#/components/schemas/McpRemoteUrl" }
            enabled: { type: boolean }
            timeoutSeconds: { type: integer, minimum: 1, maximum: 600 }
            bearerTokenSecretName: { $ref: "#/components/schemas/McpSecretName" }
    McpServerPatch:
      type: object
      additionalProperties: false
      description: Transport-specific merge patch. transport is immutable; if present it must equal the stored transport. Null is accepted only for bearerTokenSecretName to clear that binding.
      properties:
        name: { $ref: "#/components/schemas/McpServerName" }
        transport: { type: string, enum: [stdio, streamableHttp, sse] }
        command: { type: string, minLength: 1, maxLength: 1024 }
        args: { $ref: "#/components/schemas/McpArgs" }
        url: { $ref: "#/components/schemas/McpRemoteUrl" }
        enabled: { type: boolean }
        timeoutSeconds: { type: integer, minimum: 1, maximum: 600 }
        envSecretNames: { $ref: "#/components/schemas/McpSecretNameList" }
        bearerTokenSecretName:
          oneOf:
            - $ref: "#/components/schemas/McpSecretName"
            - type: "null"
    RunEventPayload:
      description: Decoded JSON from one SSE data field. The SSE event name selects the exact schema through x-sse-event-schemas. Public payloads are persisted already redacted and never reconstructed from raw internal tool journal data during replay.
      anyOf:
        - $ref: "#/components/schemas/RunQueuedEvent"
        - $ref: "#/components/schemas/RunStartedEvent"
        - $ref: "#/components/schemas/MessageStartedEvent"
        - $ref: "#/components/schemas/MessageDeltaEvent"
        - $ref: "#/components/schemas/ReasoningDeltaEvent"
        - $ref: "#/components/schemas/ToolStartedEvent"
        - $ref: "#/components/schemas/ToolProgressEvent"
        - $ref: "#/components/schemas/ToolCompletedEvent"
        - $ref: "#/components/schemas/ToolDeliveryEvent"
        - $ref: "#/components/schemas/ToolFailedEvent"
        - $ref: "#/components/schemas/ApprovalRequiredEvent"
        - $ref: "#/components/schemas/ApprovalResolvedEvent"
        - $ref: "#/components/schemas/ClarificationRequiredEvent"
        - $ref: "#/components/schemas/ClarificationResolvedEvent"
        - $ref: "#/components/schemas/UsageUpdatedEvent"
        - $ref: "#/components/schemas/MessageCompletedEvent"
        - $ref: "#/components/schemas/RunCompletedEvent"
        - $ref: "#/components/schemas/RunCancelledEvent"
        - $ref: "#/components/schemas/RunFailedEvent"
    RunEventEnvelope:
      type: object
      additionalProperties: false
      required: [schemaVersion, sequence, runId, sessionId, occurredAt, data]
      properties:
        schemaVersion: { type: integer, const: 1 }
        sequence: { type: integer, minimum: 1 }
        runId: { type: string }
        sessionId: { type: string }
        occurredAt: { type: string, format: date-time }
        data: { type: object }
    RunQueuedEvent:
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              required: [queueItemId]
              properties:
                queueItemId: { type: string, minLength: 1 }
    RunStartedEvent:
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              required: [profileId]
              properties:
                profileId: { type: string }
    MessageStartedEvent:
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              required: [messageId, role]
              properties:
                messageId: { type: string }
                role: { type: string, const: assistant }
    MessageDeltaEvent:
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              required: [messageId, delta]
              properties:
                messageId: { type: string }
                delta: { type: string, minLength: 1 }
    ReasoningDeltaEvent:
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              required: [messageId, delta]
              properties:
                messageId: { type: string }
                delta: { type: string, minLength: 1 }
    ToolStartedEvent:
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              required: [callId, name]
              properties:
                callId: { type: string }
                name: { type: string }
                inputSummary: { type: string, maxLength: 2000, description: "Redacted bounded summary, never raw arguments." }
    ToolProgressEvent:
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              required: [callId]
              properties:
                callId: { type: string }
                message: { type: string, maxLength: 2000, description: Redacted progress text. }
                progress: { type: number, minimum: 0, maximum: 1 }
    ToolCompletedEvent:
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              required: [callId, artifacts]
              properties:
                callId: { type: string }
                resultSummary: { type: string, maxLength: 8000, description: "Redacted bounded summary, never a raw tool result." }
                artifacts: { type: array, items: { $ref: "#/components/schemas/FileRef" } }
                asyncDeliveryPending:
                  type: boolean
                  description: >-
                    True only when this completed background terminal invocation
                    has one private async completion or watch delivery record
                    that can later append tool.delivery.
    ToolDeliveryEvent:
      description: >-
        Exactly-once public notification for a background terminal process.
        It is projected from a durable private delivery record. Command text,
        watch patterns, output and raw tool results are intentionally absent.
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              required: [callId, processId, delivery, status]
              properties:
                callId: { type: string }
                processId: { type: string, pattern: "^process_[0-9a-f]{32}$" }
                delivery: { type: string, enum: [completion, watch] }
                status:
                  type: string
                  enum: [starting, running, exited, killed, lost, failed_start]
                exitCode:
                  oneOf:
                    - type: integer
                    - type: "null"
                matchedPatternCount:
                  type: integer
                  minimum: 1
                  maximum: 16
    ToolFailedEvent:
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              required: [callId, error]
              properties:
                callId: { type: string }
                error: { $ref: "#/components/schemas/Problem" }
    ApprovalRequiredEvent:
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              required: [approvalId, callId, toolName, inputSummary, choices, expiresAt]
              properties:
                approvalId: { type: string }
                callId: { type: string }
                toolName: { type: string }
                inputSummary: { type: [string, "null"], maxLength: 2000, description: Required nullable field containing only a redacted summary. }
                choices:
                  type: array
                  minItems: 1
                  uniqueItems: true
                  description: The submitted decision must be a member of this exact array. Initial dangerous-tool approvals expose exactly once and deny.
                  x-current-dangerous-tool-choices: [once, deny]
                  items: { type: string, enum: [once, session, always, deny] }
                expiresAt: { type: string, format: date-time }
    ApprovalResolvedEvent:
      description: Durable linearization event for an approval. User or expiry resolution clears pendingAction and resumes the Run before any tool progress or terminal event; cancellation instead moves the Run to cancelling.
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              required: [approvalId, callId, decision, resolvedBy]
              properties:
                approvalId: { type: string }
                callId: { type: string }
                decision: { type: string, enum: [once, session, always, deny] }
                resolvedBy:
                  type: string
                  enum: [user, expiry, cancellation]
                  description: Expiry and cancellation always pair with decision=deny.
              allOf:
                - if:
                    properties:
                      resolvedBy: { enum: [expiry, cancellation] }
                    required: [resolvedBy]
                  then:
                    properties:
                      decision: { const: deny }
    ClarificationRequiredEvent:
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              required: [requestId, question, choices]
              properties:
                requestId: { type: string }
                question: { type: string, minLength: 1, maxLength: 2000 }
                choices:
                  type: array
                  minItems: 0
                  maxItems: 4
                  uniqueItems: true
                  description: Zero to four distinct selectable answers. Empty means the answer is free-form.
                  items: { type: string, minLength: 1, maxLength: 500 }
    ClarificationResolvedEvent:
      description: Durable linearization event for a clarification answer, cancellation, or fail-closed recovery. The answer is intentionally omitted from public SSE and remains only in the internal decision journal.
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              required: [requestId, resolvedBy]
              properties:
                requestId: { type: string }
                resolvedBy: { type: string, enum: [user, cancellation, failure] }
    UsageUpdatedEvent:
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/Usage" }
    MessageCompletedEvent:
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              required: [message, sessionRevision]
              properties:
                message: { $ref: "#/components/schemas/Message" }
                sessionRevision:
                  type: string
                  description: Unquoted Session revision after the committed assistant Message updated the Session representation.
    RunCompletedEvent:
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              required: [usage, messageId]
              properties:
                usage: { $ref: "#/components/schemas/Usage" }
                messageId: { type: string }
    RunCancelledEvent:
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              properties:
                reason: { type: string }
    RunFailedEvent:
      allOf:
        - $ref: "#/components/schemas/RunEventEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              required: [error]
              properties:
                error: { $ref: "#/components/schemas/Problem" }
    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status, code, requestId, retryable]
      properties:
        type: { type: string, format: uri-reference }
        title: { type: string }
        status: { type: integer, minimum: 400, maximum: 599 }
        detail: { type: [string, "null"] }
        instance: { type: [string, "null"], format: uri-reference }
        code:
          type: string
          description: Stable machine-readable code. Each response component's x-error-codes lists known values without closing the set to future additions.
        requestId: { type: string }
        retryable: { type: boolean }
