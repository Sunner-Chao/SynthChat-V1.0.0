    post:
      tags: [Files]
      operationId: uploadFile
      summary: Upload a file
      description: Stores one opaque file snapshot under HERMES_HOME without accepting a filesystem path. The semantic request fingerprint covers the validated filename, normalized MIME type and complete bytes.
      x-max-file-bytes: 8388608
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "201":
          description: File accepted and represented by an opaque ID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FileRef" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "413": { $ref: "#/components/responses/PayloadTooLarge" }
        "415": { $ref: "#/components/responses/UnsupportedMediaType" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
        "507": { $ref: "#/components/responses/InsufficientStorage" }
  /api/v1/files/{fileId}/content:
    parameters:
      - $ref: "#/components/parameters/FileId"
    get:
      tags: [Files]
      operationId: getFileContent
      summary: Read file content
      responses:
        "200":
          description: Immutable file bytes. Content-Type is the normalized allowlisted mimeType returned by upload; responses are no-store and nosniff.
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/v1/files/{fileId}:
    parameters:
      - $ref: "#/components/parameters/FileId"
    delete:
      tags: [Files]
      operationId: deleteFile
      summary: Delete a temporary file
      responses:
        "204": { description: File deleted or already absent. A retained idempotency record is not deleted and will never recreate an explicitly deleted file. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/v1/runs:
    get:
      tags: [Runs]
      operationId: listActiveRuns
      summary: Discover active runs
      description: Returns a single bounded SQLite snapshot of non-terminal Runs ordered by createdAt ascending and Run ID ascending. The Chat UI owner-validates the snapshot, replays the active Run journal from sequence 1, and then continues the live SSE stream.
      parameters:
        - name: profileId
          in: query
          required: true
          schema: { $ref: "#/components/schemas/ProfileIdValue" }
        - name: state
          in: query
          required: true
          schema: { type: string, const: active }
        - name: sessionId
          in: query
          required: false
          schema: { type: string, minLength: 9, maxLength: 128, pattern: '^session_[A-Za-z0-9_-]+$' }
      responses:
        "200":
          description: Active Run recovery snapshots from one SQLite read transaction.
          headers:
            Cache-Control:
              schema: { type: string, const: no-store }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ActiveRunList" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/SessionStorageUnavailable" }
  /api/v1/sessions/{sessionId}/runs:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      tags: [Runs]
      operationId: createRun
      summary: Create a chat run
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRun" }
      responses:
        "202":
          description: Run accepted. The same idempotency key returns the same run.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunAccepted" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "410": { $ref: "#/components/responses/Gone" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "502": { $ref: "#/components/responses/BadGateway" }
        "503": { $ref: "#/components/responses/SessionStorageUnavailable" }
        "504": { $ref: "#/components/responses/GatewayTimeout" }
  /api/v1/runs/{runId}:
    parameters:
      - $ref: "#/components/parameters/RunId"
    get:
      tags: [Runs]
      operationId: getRun
      summary: Get run state
      responses:
        "200":
          description: Pollable run state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Run" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/runs/{runId}/events:
    parameters:
      - $ref: "#/components/parameters/RunId"
      - name: Last-Event-ID
        in: header
        required: false
        schema: { type: string }
    get:
      tags: [Runs]
      operationId: streamRunEvents
      summary: Stream run events over SSE
      x-sse-event-schemas:
        run.queued: { $ref: "#/components/schemas/RunQueuedEvent" }
        run.started: { $ref: "#/components/schemas/RunStartedEvent" }
        message.started: { $ref: "#/components/schemas/MessageStartedEvent" }
        message.delta: { $ref: "#/components/schemas/MessageDeltaEvent" }
        reasoning.delta: { $ref: "#/components/schemas/ReasoningDeltaEvent" }
        tool.started: { $ref: "#/components/schemas/ToolStartedEvent" }
        tool.progress: { $ref: "#/components/schemas/ToolProgressEvent" }
        tool.completed: { $ref: "#/components/schemas/ToolCompletedEvent" }
        tool.delivery: { $ref: "#/components/schemas/ToolDeliveryEvent" }
        tool.failed: { $ref: "#/components/schemas/ToolFailedEvent" }
        approval.required: { $ref: "#/components/schemas/ApprovalRequiredEvent" }
        approval.resolved: { $ref: "#/components/schemas/ApprovalResolvedEvent" }
        clarification.required: { $ref: "#/components/schemas/ClarificationRequiredEvent" }
        clarification.resolved: { $ref: "#/components/schemas/ClarificationResolvedEvent" }
        usage.updated: { $ref: "#/components/schemas/UsageUpdatedEvent" }
        message.completed: { $ref: "#/components/schemas/MessageCompletedEvent" }
        run.completed: { $ref: "#/components/schemas/RunCompletedEvent" }
        run.cancelled: { $ref: "#/components/schemas/RunCancelledEvent" }
        run.failed: { $ref: "#/components/schemas/RunFailedEvent" }
      responses:
        "200":
          description: |
            SSE stream. Normative ordering, replay, event names and terminal-event
            rules are defined in docs/api-contract.md section 6. While a
            non-terminal stream is idle, the server sends an SSE heartbeat
            comment at least every 15 seconds; heartbeats do not allocate a
            sequence.
          headers:
            Cache-Control:
              schema: { type: string, const: no-cache }
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/RunEventPayload"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/runs/{runId}/cancel:
    parameters:
      - $ref: "#/components/parameters/RunId"
    post:
      tags: [Runs]
      operationId: cancelRun
      summary: Cancel a run
      responses:
        "202":
          description: Cancellation requested or run already terminal.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Run" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/runs/{runId}/approvals/{approvalId}:
    parameters:
      - $ref: "#/components/parameters/RunId"
      - $ref: "#/components/parameters/ApprovalId"
    post:
      tags: [Runs]
      operationId: resolveApproval
      summary: Resolve a tool approval
      description: Resolve the outstanding durable approval for this Run. The decision must be one of the exact PendingApprovalAction choices; identical payloads are replayable and conflicting payloads return 409.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApprovalDecision" }
      responses:
        "200":
          description: Approval decision accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ActionAccepted" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/ApprovalConflict" }
        "413": { $ref: "#/components/responses/PayloadTooLarge" }
        "415": { $ref: "#/components/responses/UnsupportedMediaType" }
        "503": { $ref: "#/components/responses/SessionStorageUnavailable" }
  /api/v1/runs/{runId}/clarifications/{requestId}:
    parameters:
      - $ref: "#/components/parameters/RunId"
      - $ref: "#/components/parameters/ClarificationId"
    post:
      tags: [Runs]
      operationId: answerClarification
      summary: Answer a clarification request
      description: Resolve the outstanding durable clarification for this Run. For multiple-choice requests, the answer must exactly match an offered choice. Identical answers are replayable; a different replay conflicts. Answers are retained only in the internal continuation journal and are never echoed through public events or Problems.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ClarificationAnswer" }
      responses:
        "200":
          description: Clarification answer accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ActionAccepted" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/ClarificationConflict" }
        "413": { $ref: "#/components/responses/PayloadTooLarge" }
        "415": { $ref: "#/components/responses/UnsupportedMediaType" }
        "503": { $ref: "#/components/responses/SessionStorageUnavailable" }
  /api/v1/profiles/{profileId}/workspaces:
    parameters:
      - $ref: "#/components/parameters/ProfileId"
    get:
      tags: [Workspaces]
      operationId: listWorkspaces
      summary: List opaque workspace registrations
      responses:
        "200":
          description: Profile-scoped roots without local paths.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Workspace" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/SessionStorageUnavailable" }
    post:
      tags: [Workspaces]
      operationId: registerWorkspace
      summary: Register an existing absolute directory as a tool root
      description: The local path is accepted only in this write request, canonicalized by Rust and never returned by the API.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterWorkspace" }
      responses:
        "201":
          description: Workspace registered or idempotently replayed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Unprocessable" }
        "503": { $ref: "#/components/responses/SessionStorageUnavailable" }
  /api/v1/profiles/{profileId}/workspaces/{workspaceId}:
    parameters:
      - $ref: "#/components/parameters/ProfileId"
      - $ref: "#/components/parameters/WorkspaceId"
    delete:
      tags: [Workspaces]
      operationId: deleteWorkspace
      summary: Delete an unreferenced workspace registration
      responses:
        "204": { description: Registration deleted; the directory and its contents are never modified. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "503": { $ref: "#/components/responses/SessionStorageUnavailable" }
  /api/v1/profiles/{profileId}/toolsets:
    parameters:
      - $ref: "#/components/parameters/ProfileId"
    get:
      tags: [Tools]
      operationId: listToolsets
      summary: List dynamic toolsets
      responses:
        "200":
          description: Dynamic toolset catalog for a profile. ETag is the current ProfileConfig revision shared with config and toolset writes.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
