          application/merge-patch+json:
            schema: { $ref: "#/components/schemas/McpServerPatch" }
      responses:
        "200":
          description: MCP server updated.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
            Cache-Control: { schema: { type: string, const: no-store } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/McpServer" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "413": { $ref: "#/components/responses/PayloadTooLarge" }
        "415": { $ref: "#/components/responses/UnsupportedMediaType" }
        "428": { $ref: "#/components/responses/PreconditionRequired" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
    delete:
      tags: [MCP]
      operationId: deleteMcpServer
      summary: Delete an MCP server
      description: Idempotent for an already absent valid opaque server ID, but still requires the current Profile config ETag.
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "204":
          description: MCP server removed or already absent.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
            Cache-Control: { schema: { type: string, const: no-store } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "428": { $ref: "#/components/responses/PreconditionRequired" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-desktop-session-token
  headers:
    ETag:
      description: Opaque resource revision, including quotes as required by HTTP.
      schema: { type: string }
  parameters:
    ProfileId: { name: profileId, in: path, required: true, schema: { $ref: "#/components/schemas/ProfileIdValue" } }
    SessionId: { name: sessionId, in: path, required: true, schema: { type: string } }
    RunId: { name: runId, in: path, required: true, schema: { type: string } }
    FileId: { name: fileId, in: path, required: true, schema: { type: string, pattern: '^file_[0-9a-f]{32}$' } }
    ApprovalId: { name: approvalId, in: path, required: true, schema: { type: string } }
    ClarificationId: { name: requestId, in: path, required: true, schema: { type: string } }
    OperationId: { name: operationId, in: path, required: true, schema: { type: string, pattern: '^op_[0-9a-f]{32}$' } }
    ToolsetId: { name: toolsetId, in: path, required: true, schema: { type: string } }
    WorkspaceId: { name: workspaceId, in: path, required: true, schema: { type: string, pattern: '^workspace_[A-Za-z0-9_]+$' } }
    SkillId: { name: skillId, in: path, required: true, schema: { type: string, pattern: '^skill_[0-9a-f]{32}$' } }
    MemoryId:
      name: memoryId
      in: path
      required: true
      description: Revision-scoped opaque item identifier from the latest page for the same target. It must never be parsed, cached across a revision change or used with another target.
      schema: { type: string, minLength: 1, maxLength: 512 }
    PersonaId: { name: personaId, in: path, required: true, schema: { type: string, pattern: '^persona_[0-9a-f]{32}$' } }
    WechatAccountId: { name: accountId, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 256 } }
    PluginId: { name: pluginId, in: path, required: true, schema: { type: string, pattern: '^[a-z0-9][a-z0-9_.-]{0,63}$' } }
    WorldbookId: { name: worldbookId, in: path, required: true, schema: { type: string, pattern: '^worldbook_[0-9a-f]{32}$' } }
    MomentId: { name: momentId, in: path, required: true, schema: { type: string, pattern: '^moment_[0-9a-f]{32}$' } }
    CommentId: { name: commentId, in: path, required: true, schema: { type: string, pattern: '^comment_[0-9a-f]{32}$' } }
    McpServerId: { name: serverId, in: path, required: true, schema: { type: string, pattern: '^mcp_[0-9a-f]{32}$' } }
    SecretName: { name: secretName, in: path, required: true, schema: { $ref: "#/components/schemas/SecretName" } }
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque, tamper-evident continuation bound to the endpoint filters and snapshot boundary.
      schema: { type: string, minLength: 1, maxLength: 4096 }
    Limit: { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 30 } }
    ProductSearchQuery:
      name: q
      in: query
      required: false
      description: Optional case-insensitive substring search. Control characters are rejected.
      schema: { type: string, maxLength: 200 }
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: A single quoted strong ETag. Weak, wildcard, multiple or malformed values are invalid.
      schema: { type: string }
    PersonaIfMatch:
      name: If-Match
      in: header
      required: true
      description: The single quoted strong Persona ETag returned by the last successful create or mutation.
      schema: { type: string, pattern: '^"product-persona-[1-9][0-9]*"$' }
    PluginIfMatch:
      name: If-Match
      in: header
      required: true
      description: The single quoted strong plugin catalog ETag returned by the latest catalog response.
      schema: { type: string, pattern: '^"plugin-catalog-(0|[1-9][0-9]*)"$' }
    WorldbookIfMatch:
      name: If-Match
      in: header
      required: true
      description: The single quoted strong Worldbook ETag returned by the last successful create or mutation.
      schema: { type: string, pattern: '^"product-worldbook-[1-9][0-9]*"$' }
    MomentIfMatch:
      name: If-Match
      in: header
      required: true
      description: The single quoted strong Moment ETag returned by the last successful create or mutation, including comment and like mutations.
      schema: { type: string, pattern: '^"product-moment-[1-9][0-9]*"$' }
    IfMatchOptional:
      name: If-Match
      in: header
      required: false
      description: Required when the target Session still exists. It may be omitted only when replaying deletion of an already absent Session; any supplied value is syntax-validated first and must be one quoted strong ETag even when the Session is absent.
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Required for non-idempotent creates. Scoped by installation, method and canonical path; retained for at least 24 hours. Reuse with a different request fingerprint returns 409.
      schema: { type: string, minLength: 8, maxLength: 128 }
  responses:
    BadRequest:
      description: Invalid request.
      x-error-codes: [validation_failed, invalid_if_match, invalid_cursor]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Unauthorized:
      description: Missing or invalid desktop token.
      x-error-codes: [unauthorized]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    NotFound:
      description: Resource not found.
      x-error-codes: [resource_not_found, profile_not_found, approval_not_found, clarification_not_found, hermes_state_not_found]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ProductNotFound:
      description: The Profile or requested product catalog item does not exist.
      x-error-codes: [profile_not_found, product_not_found]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Conflict:
      description: State, revision, idempotency, replay-window or busy conflict.
      x-error-codes: [revision_conflict, idempotency_conflict, idempotency_resource_gone, mcp_server_exists, mcp_config_invalid, capacity_exceeded, unsafe_file_path, memory_storage_drift, profile_delete_conflict, session_busy, session_archived, event_history_expired, hermes_import_source_changed, hermes_import_conflict]
      headers:
        ETag: { $ref: "#/components/headers/ETag" }
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ProductRevisionConflict:
      description: The product item changed after the supplied strong ETag was issued. Refetch the item before retrying.
      x-error-codes: [revision_conflict]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ApprovalConflict:
      description: The approval choice was not offered, a different decision was already committed, the deadline passed, or the Run is no longer awaiting this approval.
      x-error-codes: [approval_choice_not_offered, approval_decision_conflict, approval_expired, approval_no_longer_pending]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ClarificationConflict:
      description: The answer was not an offered choice, a different answer was already committed, or the Run is no longer awaiting this clarification.
      x-error-codes: [clarification_choice_not_offered, clarification_answer_conflict, clarification_no_longer_pending]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    PreconditionRequired:
      description: A single strong If-Match value is required.
      x-error-codes: [precondition_required]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Gone:
      description: The resource bound to a retained idempotency record was explicitly deleted and will not be recreated.
      x-error-codes: [idempotent_resource_deleted]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ServiceUnavailable:
      description: A required local service or protected store is unavailable.
      x-error-codes: [secret_storage_unavailable, file_storage_unavailable, skill_storage_unavailable, skill_management_unavailable, operation_storage_unavailable]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ProductCatalogUnavailable:
      description: The local bounded product catalog could not complete the operation.
      x-error-codes: [product_catalog_unavailable]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    InsufficientStorage:
      description: A bounded local retained-object quota is exhausted; callers must delete no-longer-needed objects before retrying.
      x-error-codes: [file_quota_exceeded]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    SessionStorageUnavailable:
      description: The local session database is unavailable or remained locked past its bounded busy timeout.
      x-error-codes: [session_storage_unavailable, session_storage_busy, hermes_state_unavailable]
      headers:
        Retry-After:
          description: Optional retry delay in seconds for a transient busy database.
          schema: { type: integer, minimum: 0 }
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Unprocessable:
      description: A required capability/provider is unavailable, or a semantically valid request violates a protected resource constraint.
      x-error-codes: [engine_capability_missing, provider_configuration_invalid, memory_provider_unsupported, memory_content_blocked, memory_capacity_exceeded, session_search_unavailable, hermes_schema_unsupported, hermes_import_source_invalid, hermes_attachments_require_policy]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    PayloadTooLarge:
      description: Upload or body exceeds the advertised limit.
      x-error-codes: [payload_too_large, hermes_import_too_large]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ProductCatalogLimit:
      description: The request body exceeds the API limit or the Profile already contains 2,000 items of this product kind or 1,000 comments on this Moment.
      x-error-codes: [payload_too_large, product_catalog_limit]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    UnsupportedMediaType:
      description: The request does not carry the single required media type.
      x-error-codes: [unsupported_media_type, unsupported_file_type]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    TooManyRequests:
      description: Run, queue, or bounded asynchronous operation capacity exceeded.
      x-error-codes: [capacity_exceeded, provider_rate_limited, skill_source_rate_limited, skill_operation_capacity]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    BadGateway:
      description: External model/tool provider failed.
      x-error-codes: [engine_unavailable, provider_authentication_failed, provider_request_rejected, provider_stream_failed, provider_response_invalid]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    GatewayTimeout:
      description: External model/tool provider timed out.
      x-error-codes: [engine_timeout]
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status, service, version]
      properties:
        status: { type: string, const: ok }
        service: { type: string, const: synthchat-hermes-backend }
        version: { type: string }
    Capabilities:
      type: object
      additionalProperties: false
      required: [contractVersion, backendVersion, engine, sessionStorage, sessionSearch, files, extensions]
      properties:
        contractVersion: { type: string, const: v1 }
        backendVersion: { type: string }
        engine:
          type: object
          additionalProperties: false
          required: [kind, available, version, pinnedCommit, features]
          properties:
            kind: { type: string, enum: [hermes-rust, unavailable] }
            available: { type: boolean }
            version: { type: [string, "null"] }
            pinnedCommit: { type: [string, "null"] }
            features: { $ref: "#/components/schemas/EngineFeatures" }
        sessionStorage:
          type: object
          additionalProperties: false
          required: [available, schemaVersion, hermesImportAvailable]
          properties:
            available:
              type: boolean
              description: True only when the versioned Rust-owned SQLite store initialized successfully and Session management routes are usable.
            schemaVersion: { type: [integer, "null"], minimum: 1 }
            hermesImportAvailable:
              type: boolean
              description: True only after the fixed-version read-only Hermes state.db importer is implemented and verified.
        sessionSearch:
          type: object
          additionalProperties: false
          required: [mode]
          properties:
            mode:
              type: string
              enum: [fts5, trigram, like, unavailable]
              description: Startup-probed effective mode. FTS failure falls back to literal escaped LIKE; unavailable rejects only non-empty search queries.
        files:
          type: object
          additionalProperties: false
          required: [maxBytes, allowedMimeTypes]
          properties:
            maxBytes: { type: integer, minimum: 8388608, maximum: 8388608 }
            allowedMimeTypes:
              type: array
              minItems: 17
              maxItems: 17
              uniqueItems: true
              items:
                type: string
                enum: [application/json, application/octet-stream, application/pdf, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.openxmlformats-officedocument.wordprocessingml.document, application/x-zip-compressed, application/yaml, application/zip, image/gif, image/jpeg, image/png, image/webp, text/csv, text/markdown, text/plain, text/tab-separated-values, text/yaml]
        extensions: { $ref: "#/components/schemas/CapabilityExtensions" }
    CapabilityExtensions:
      type: object
      additionalProperties: true
      required: [activeRunDiscovery, runQueue, toolsetManagement, toolExecution, codeExecution, workspaceManagement, skillDiscovery, skillEnablement, webSearch, webExtract, browserAutomation, browserCdp, browserDownloads, mcpStdio, mcpStreamableHttp, mcpSse, wechatAccounts, wechatMessaging, plugins, personas, moments, worldbooks]
      properties:
        activeRunDiscovery:
          type: boolean
          description: Whether clients can discover non-terminal Runs without already knowing a Run ID.
        runQueue:
          type: boolean
          description: Whether a second non-terminal Run for one Session can enter a persistent queue.
        toolsetManagement:
          type: boolean
          description: Whether profile-scoped Toolset catalog listing and enablement PATCH are available. This does not imply every catalog tool, Memory or MCP support.
        toolExecution:
          type: boolean
          description: >-
            Whether the Run engine may invoke registered Rust tool executors.
            The aggregate flag is insufficient to infer a domain: Web tools
            additionally require webSearch or webExtract plus a ready Profile
            provider, while Browser remains governed by its separate runtime
            readiness flags. Existing clarification, memory, Workspace file and
            terminal/process approval and ownership rules continue to apply. This
            flag does not imply an OS sandbox, crash-safe or exactly-once launch,
            confirmed process-tree termination, Browser tools, MCP, or public
            REST process-management endpoints.
        codeExecution:
          type: boolean
          description: >-
            Whether the Rust Run engine can supervise the pinned Hermes
            execute_code contract through an available host Python 3 interpreter.
            This is false when either the Run/session runtime or the interpreter
            is unavailable.
            The script requires owner-bound one-shot approval, receives a
            scrubbed environment, and may call only the dynamically advertised
            subset of web_search, web_extract, read_file, write_file,
            search_files, patch and foreground terminal. The script itself has
            host authority and is not an OS or container sandbox.
        workspaceManagement:
          type: boolean
          description: Whether Profiles can register opaque, canonical local directory roots for later scoped tools. Registration alone does not enable file or terminal execution.
        skillDiscovery:
          type: boolean
          description: Whether installed Profile-scoped Hermes skills can be listed and searched.
        skillEnablement:
          type: boolean
          description: Whether installed skills can be enabled or disabled with ProfileConfig ETag concurrency control. This does not imply install or uninstall support.
        webSearch:
          type: boolean
          x-web-first-value: true
          description: Web-first acceptance value is true only when the Rust web_search executor, Tavily adapter, Profile Web configuration routes, keychain lookup, bounded egress policy and Run-level tests are all available. It describes implemented engine support, not whether a particular Profile has selected a ready provider.
        webExtract:
          type: boolean
          x-web-first-value: true
          description: Web-first acceptance value is true only when the Rust web_extract executor implements the five-URL contract, Tavily extraction, output bounds, URL policy and Run-level tests. Per-Profile readiness remains in WebConfig.effectiveExtract.
        browserAutomation:
          type: boolean
          description: True only when the Rust Run engine is available and a supported local Chromium-family binary was discovered. It covers an isolated per-Profile/Run browser process, loopback CDP, enforced egress proxy, bounded snapshots/images and approval-bound interaction; it does not imply downloads or arbitrary browser access outside a Run.
        browserCdp:
          type: boolean
          description: True exactly with browserAutomation for the bounded Rust CDP surface. Interactive and Runtime.evaluate operations require an owner-bound durable once approval and a current snapshot precondition; arbitrary CDP methods remain denied.
        browserDownloads:
          type: boolean
          description: True exactly when browserAutomation is true. The browser_download tool requires a current snapshot and owner-bound durable once approval, temporarily accepts one bounded file in private per-Run storage, performs filename/MIME/size/SHA-256 checks, returns metadata only, restores deny mode and removes the content. No local path, file body, auto-open, File object or Workspace import is exposed.
        wechatAccounts:
          type: boolean
          description: Whether Profile-scoped WeChat configuration, QR login status, Persona binding and keychain-backed account metadata routes are available.
        wechatMessaging:
          type: boolean
          description: Whether explicit bounded WeChat poll/send adapters are available. This does not imply background polling or automatic message-to-Run delivery.
        plugins:
          type: boolean
          description: Whether the local manifest-only plugin catalog supports listing, registration, enablement and removal. This never implies plugin code execution.
        personas:
          type: boolean
          description: Whether Profile-scoped bounded Persona CRUD with independent strong product ETags is available.
        moments:
          type: boolean
          description: Whether Profile-scoped bounded Moment CRUD, comments and actor like state with independent strong product ETags are available.
        worldbooks:
          type: boolean
          description: Whether Profile-scoped bounded Worldbook CRUD, Persona bindings and section snapshots with independent strong product ETags are available.
        mcpStdio:
          type: boolean
          description: Whether enabled Profile-scoped stdio MCP servers support initialize, tools/list, tools/call and Run injection with child-process cleanup.
        mcpStreamableHttp:
          type: boolean
          description: Whether Streamable HTTP MCP transport is executable with pinned validated DNS, bounded manual redirects, JSON or SSE responses, negotiated protocol-version headers, origin-bound session IDs, cancellation and Run injection.
        mcpSse:
          type: boolean
          description: Whether legacy SSE MCP transport is executable with a bounded persistent event stream, same-origin endpoint negotiation, validated POST delivery, cancellation and Run injection.
    EngineFeatures:
      type: object
      additionalProperties: false
      required: [runStreaming, reasoningStreaming, toolProgress, approvals, clarifications, asyncToolDelivery, profileManagement, skillManagement, memoryWrite, mcpManagement, oauthAccounts]
      properties:
        runStreaming: { type: boolean }
        reasoningStreaming: { type: boolean }
        toolProgress: { type: boolean, description: True for persisted started/completed/failed events emitted by registered Rust executors. }
        approvals: { type: boolean, description: "True when durable once/deny tool approvals, expiry, cancellation and single-use execution claims are available." }
        clarifications: { type: boolean, description: "True when durable clarification request/answer, cancellation, restart recovery and single-use private continuation claims are available. Answers are never included in public Run, Message, SSE or Problem payloads." }
        asyncToolDelivery:
          type: boolean
          description: >-
            True only when a background terminal call can durably deliver one
            redacted completion or watch event to its owning Run across restart.
            Public events never contain command text, watch patterns, or process
            output; explicit process polling remains the private-result path.
        profileManagement: { type: boolean }
        skillManagement: { type: boolean }
        memoryWrite: { type: boolean }
        mcpManagement: { type: boolean }
        oauthAccounts: { type: boolean }
    Bootstrap:
      type: object
      additionalProperties: false
      description: The sessions page is the first unarchived, empty-query page for activeProfileId with the normal default limit; its nextCursor continues only that exact filter set through GET /sessions.
      required: [capabilities, profiles, activeProfileId, sessions, capturedAt]
      properties:
        capabilities: { $ref: "#/components/schemas/Capabilities" }
        profiles: { type: array, items: { $ref: "#/components/schemas/Profile" } }
        activeProfileId: { $ref: "#/components/schemas/ProfileIdValue" }
        sessions: { $ref: "#/components/schemas/SessionPage" }
        capturedAt: { type: string, format: date-time }
    Provider:
      type: object
      additionalProperties: false
      required: [id, displayName, defaultBaseUrl, requiresSecret, secretNames, supportsModelDiscovery]
      properties:
        id: { type: string }
        displayName: { type: string }
        defaultBaseUrl:
          type: [string, "null"]
          format: uri
          pattern: "^[Hh][Tt][Tt][Pp][Ss]?://"
          description: When non-null, requires a host and forbids userinfo, query and fragment components.
        requiresSecret: { type: boolean }
        secretNames: { type: array, items: { $ref: "#/components/schemas/SecretName" } }
        supportsModelDiscovery: { type: boolean }
    WebProviderId:
      type: string
      const: tavily
      description: Provider ID accepted by WebConfigPatch in the Web-first slice.
    WebProvider:
      type: object
      additionalProperties: false
      required: [id, displayName, supportsSearch, supportsExtract, secretNames, defaultBaseUrl, customEndpointSupported]
      properties:
        id: { $ref: "#/components/schemas/WebProviderId" }
        displayName: { type: string, const: Tavily }
        supportsSearch: { type: boolean, const: true }
        supportsExtract: { type: boolean, const: true }
        secretNames:
          type: array
          minItems: 1
          maxItems: 1
          items: { type: string, const: TAVILY_API_KEY }
        defaultBaseUrl:
          type: string
          format: uri
          maxLength: 2048
          pattern: "^[Hh][Tt][Tt][Pp][Ss]://"
          description: Backend-effective Tavily base URL. It defaults to the official endpoint and may be set only by trusted runtime configuration; it is not Profile-writable.
        customEndpointSupported:
          type: boolean
          const: false
          description: Profiles cannot supply or override provider endpoints; trusted runtime configuration is outside the Profile API.
    EffectiveWebProvider:
      type: object
      additionalProperties: false
      required: [providerId, status, missingSecretNames]
      properties:
        providerId:
          type: [string, "null"]
          maxLength: 128
          description: Effective provider ID after capability-specific override, shared fallback and the single implemented-provider shortcut. An unsupported legacy YAML value is preserved here for diagnostics.
        status:
          type: string
          enum: [ready, unconfigured, missingSecret, unsupported, capabilityUnsupported]
          description: Readiness is a local configuration/keychain projection and performs no billable or remote network probe.
        missingSecretNames:
          type: array
          maxItems: 8
          items: { $ref: "#/components/schemas/SecretName" }
          description: Required keychain names that are absent. Values, previews and lengths are never returned.
    WebConfig:
      type: object
      additionalProperties: false
      required: [revision, sharedProvider, searchProvider, extractProvider, extractCharLimit, effectiveSearch, effectiveExtract]
      properties:
        revision:
          type: string
          minLength: 1
          description: Unquoted shared ProfileConfig revision corresponding to the response ETag.
        sharedProvider:
          type: [string, "null"]
          maxLength: 128
          description: Stored web.backend fallback. Null means no explicit shared provider; unsupported legacy values remain visible but are never executed.
        searchProvider:
          type: [string, "null"]
          maxLength: 128
          description: Stored web.search_backend override. Null delegates to sharedProvider and then the single implemented-provider shortcut.
        extractProvider:
          type: [string, "null"]
          maxLength: 128
          description: Stored web.extract_backend override. Null delegates to sharedProvider and then the single implemented-provider shortcut.
        extractCharLimit:
          type: integer
          minimum: 2000
          maximum: 500000
          default: 15000
          description: Per-page clean character budget for web_extract provider content.
        effectiveSearch: { $ref: "#/components/schemas/EffectiveWebProvider" }
        effectiveExtract: { $ref: "#/components/schemas/EffectiveWebProvider" }
    WebConfigPatch:
      type: object
      additionalProperties: false
      description: Dedicated RFC 7396 merge patch for non-secret Web settings. Null clears a provider override. The only selectable provider is tavily; existing unsupported YAML values are preserved until explicitly replaced or cleared.
      x-merge-patch-profile:
        explicitNullPaths: [/sharedProvider, /searchProvider, /extractProvider]
        nullDeletesProperties: true
        rejectOtherNulls: true
      properties:
        sharedProvider:
          oneOf:
            - $ref: "#/components/schemas/WebProviderId"
            - type: "null"
        searchProvider:
          oneOf:
            - $ref: "#/components/schemas/WebProviderId"
            - type: "null"
        extractProvider:
          oneOf:
            - $ref: "#/components/schemas/WebProviderId"
            - type: "null"
        extractCharLimit:
          type: integer
          minimum: 2000
          maximum: 500000
    Profile:
      type: object
      additionalProperties: false
      required: [id, displayName, isDefault, isActive, engineState, configRevision, updatedAt]
      properties:
        id: { $ref: "#/components/schemas/ProfileIdValue" }
        displayName: { $ref: "#/components/schemas/ProfileDisplayName" }
        isDefault: { type: boolean }
        isActive: { type: boolean }
        color: { $ref: "#/components/schemas/ProfileColor" }
        avatarFileId: { type: [string, "null"] }
        engineState:
          type: string
          enum: [stopped, starting, running, degraded, failed]
          description: Shared on-demand Rust Run service readiness for this profile; it is not a Provider credential or endpoint preflight result.
        configRevision: { type: string }
        createdAt: { type: [string, "null"], format: date-time }
        updatedAt: { type: string, format: date-time }
    ProfileMetadata:
      type: object
      additionalProperties: false
      required: [id, displayName, isDefault, updatedAt]
      properties:
        id: { $ref: "#/components/schemas/ProfileIdValue" }
        displayName: { $ref: "#/components/schemas/ProfileDisplayName" }
        isDefault: { type: boolean }
        color: { $ref: "#/components/schemas/ProfileColor" }
        avatarFileId: { type: [string, "null"] }
        createdAt: { type: [string, "null"], format: date-time }
        updatedAt: { type: string, format: date-time }
    ProfileIdValue:
      type: string
      pattern: "^(default|[a-z0-9_][a-z0-9_-]{0,63})$"
    NamedProfileId:
      allOf:
        - $ref: "#/components/schemas/ProfileIdValue"
      not: { const: default }
    ProfileDisplayName:
      type: string
      minLength: 1
      maxLength: 80
    ProfileColor:
      type: [string, "null"]
      pattern: "^#[0-9A-Fa-f]{6}$"
    CreateProfile:
      type: object
      additionalProperties: false
      required: [id, displayName]
      properties:
        id: { $ref: "#/components/schemas/NamedProfileId" }
        displayName: { $ref: "#/components/schemas/ProfileDisplayName" }
        cloneFromProfileId:
          oneOf:
            - $ref: "#/components/schemas/ProfileIdValue"
            - type: "null"
    ProfilePatch:
      type: object
      additionalProperties: false
      description: Constrained merge patch. Null clears color or avatarFileId and is rejected for every other field.
      x-merge-patch-profile:
        explicitNullPaths: [/color, /avatarFileId]
        rejectOtherNulls: true
      properties:
        displayName: { $ref: "#/components/schemas/ProfileDisplayName" }
        color:
          allOf:
            - $ref: "#/components/schemas/ProfileColor"
          description: Null clears the stored color.
        avatarFileId:
          type: [string, "null"]
          description: Null clears the stored avatar.
    ModelConfig:
      type: object
      additionalProperties: false
      required: [provider, model, baseUrl]
      properties:
        provider: { type: string }
        model: { type: string }
        baseUrl:
          type: [string, "null"]
          format: uri
          pattern: "^[Hh][Tt][Tt][Pp][Ss]?://"
          description: Null selects the provider default. Non-null values require a host and forbid userinfo, query and fragment components.
        reasoningEffort: { type: [string, "null"], enum: [minimal, low, medium, high, xhigh, null] }
    ProfileConfig:
      type: object
      additionalProperties: false
      required: [revision, model, codeExecution, toolsets, skills, memoryProvider, platforms, extensions]
      properties:
        revision: { type: string }
        model: { $ref: "#/components/schemas/ModelConfig" }
        codeExecution: { $ref: "#/components/schemas/CodeExecutionConfig" }
        toolsets:
          type: object
          description: Normalized CLI toolset state backed by platform_toolsets.cli and agent.disabled_toolsets. Disabled entries override enabled entries.
          additionalProperties: { type: boolean }
        skills:
          type: object
          readOnly: true
          description: Derived enablement projection from the dedicated Skills directory and nested configuration subsystem. It may be empty until that subsystem is available and is never writable through ProfileConfigPatch.
          additionalProperties: { type: boolean }
        memoryProvider: { type: string }
        platforms:
          type: object
          readOnly: true
          description: Derived platform availability from keychain/environment state plus top-level platform enabled=false overrides. It may be empty until dedicated platform endpoints are available and is never writable through ProfileConfigPatch.
          additionalProperties: { type: boolean }
        extensions:
          type: object
          additionalProperties: { $ref: "#/components/schemas/NonNullJsonValue" }
    ProfileConfigPatch:
      type: object
      additionalProperties: false
      description: Constrained merge patch for model, codeExecution, toolsets, memoryProvider and extensions only. Skills and platforms are derived by dedicated subsystems. Null is an explicit state only for model.baseUrl and model.reasoningEffort; all other nulls are rejected and never delete properties.
      x-merge-patch-profile:
        explicitNullPaths: [/model/baseUrl, /model/reasoningEffort]
        nullDeletesProperties: false
        rejectOtherNulls: true
      properties:
        model: { $ref: "#/components/schemas/ModelConfigPatch" }
        codeExecution: { $ref: "#/components/schemas/CodeExecutionConfigPatch" }
        toolsets:
          type: object
          description: Field-level desired state. True inserts the ID into platform_toolsets.cli and removes it from agent.disabled_toolsets; false removes it from platform_toolsets.cli and inserts it into agent.disabled_toolsets.
          additionalProperties: { type: boolean }
        memoryProvider: { type: string }
        extensions:
          type: object
          description: Non-secret extension values. Null is rejected at every nesting level.
          additionalProperties: { $ref: "#/components/schemas/NonNullJsonValue" }
    CodeExecutionConfig:
      type: object
      additionalProperties: false
      required: [mode, timeoutSeconds, maxToolCalls]
      properties:
        mode:
          type: string
          enum: [project, strict]
          description: Project uses the Run Workspace as cwd when present; strict uses the private staging directory. Neither mode is an OS sandbox.
        timeoutSeconds: { type: integer, minimum: 1, maximum: 600, default: 300 }
        maxToolCalls: { type: integer, minimum: 1, maximum: 100, default: 50 }
    CodeExecutionConfigPatch:
      type: object
      additionalProperties: false
      properties:
        mode: { type: string, enum: [project, strict] }
        timeoutSeconds: { type: integer, minimum: 1, maximum: 600 }
        maxToolCalls: { type: integer, minimum: 1, maximum: 100 }
    ModelConfigPatch:
      type: object
      additionalProperties: false
      properties:
        provider: { type: string }
        model: { type: string }
        baseUrl:
          type: [string, "null"]
          format: uri
          pattern: "^[Hh][Tt][Tt][Pp][Ss]?://"
          description: Null is an explicit provider-default state, not a property deletion. Non-null values require a host and forbid userinfo, query and fragment components.
        reasoningEffort:
          type: [string, "null"]
          enum: [minimal, low, medium, high, xhigh, null]
          description: Null is an explicit provider-default state, not a property deletion.
    NonNullJsonValue:
      description: JSON value excluding null recursively.
      oneOf:
        - type: string
        - type: number
        - type: boolean
        - type: array
          items: { $ref: "#/components/schemas/NonNullJsonValue" }
        - type: object
          additionalProperties: { $ref: "#/components/schemas/NonNullJsonValue" }
    CatalogReferenceId:
      type: string
      minLength: 1
      maxLength: 256
      pattern: '^[A-Za-z0-9_.-]+$'
      description: Opaque product or File reference accepted for compatibility. Clients must not parse the value.
    PersonaIdValue:
      type: string
      pattern: '^persona_[0-9a-f]{32}$'
      description: Opaque Profile-scoped Persona identifier.
    PersonaInput:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        avatar: { type: [string, "null"], maxLength: 4096, default: null }
        systemPrompt:
          type: string
          maxLength: 64000
          default: 你正在扮演这个角色，请保持设定一致并自然交流。
        characterPrompt: { type: string, maxLength: 64000, default: "" }
        outputExamples: { type: string, maxLength: 64000, default: "" }
        systemInstructions:
          type: string
          maxLength: 64000
          default: 请始终保持角色一致性，结合角色详情、世界书与长期记忆作答。
        provider: { type: string, maxLength: 256, default: "" }
        model: { type: string, maxLength: 256, default: "" }
        temperature: { type: number, minimum: 0, maximum: 2, default: 0.8 }
        maxTokens: { type: integer, minimum: 1, maximum: 1000000, default: 2048 }
        toolsEnabled: { type: boolean, default: true }
        memoryEnabled: { type: boolean, default: true }
        proactiveEnabled: { type: boolean, default: false }
        legacyAgentId:
          type: [string, "null"]
          maxLength: 256
          default: null
          description: Optional migration metadata only. It does not restore or invoke a legacy Agent runtime.
    Persona:
      type: object
      additionalProperties: false
      required: [id, name, avatar, systemPrompt, characterPrompt, outputExamples, systemInstructions, provider, model, temperature, maxTokens, toolsEnabled, memoryEnabled, proactiveEnabled, legacyAgentId, createdAt, updatedAt, revision]
      properties:
        id: { type: string, pattern: '^persona_[0-9a-f]{32}$' }
        name: { type: string, minLength: 1, maxLength: 120 }
        avatar: { type: [string, "null"], maxLength: 4096 }
        systemPrompt: { type: string, maxLength: 64000 }
        characterPrompt: { type: string, maxLength: 64000 }
        outputExamples: { type: string, maxLength: 64000 }
        systemInstructions: { type: string, maxLength: 64000 }
        provider: { type: string, maxLength: 256 }
        model: { type: string, maxLength: 256 }
        temperature: { type: number, minimum: 0, maximum: 2 }
        maxTokens: { type: integer, minimum: 1, maximum: 1000000 }
        toolsEnabled: { type: boolean }
        memoryEnabled: { type: boolean }
        proactiveEnabled: { type: boolean }
        legacyAgentId: { type: [string, "null"], maxLength: 256 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        revision: { type: integer, minimum: 1 }
    WorldbookSectionInput:
      type: object
      additionalProperties: false
      required: [key, content]
      properties:
        key: { type: string, minLength: 1, maxLength: 300 }
        content: { type: string, minLength: 1, maxLength: 64000 }
        enabled: { type: boolean, default: true }
    WorldbookSection:
      type: object
      additionalProperties: false
      required: [id, key, content, enabled]
      properties:
        id: { type: string, pattern: '^section_[0-9a-f]{32}$' }
        key: { type: string, minLength: 1, maxLength: 300 }
        content: { type: string, minLength: 1, maxLength: 64000 }
        enabled: { type: boolean }
    WorldbookInput:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        description: { type: string, maxLength: 8000, default: "" }
        boundPersonaIds:
          type: array
          maxItems: 200
          default: []
          items: { $ref: "#/components/schemas/CatalogReferenceId" }
        sections:
          type: array
          maxItems: 200
          default: []
          items: { $ref: "#/components/schemas/WorldbookSectionInput" }
    Worldbook:
      type: object
      additionalProperties: false
      required: [id, name, description, boundPersonaIds, sections, createdAt, updatedAt, revision]
      properties:
        id: { type: string, pattern: '^worldbook_[0-9a-f]{32}$' }
        name: { type: string, minLength: 1, maxLength: 120 }
        description: { type: string, maxLength: 8000 }
        boundPersonaIds:
          type: array
          maxItems: 200
          items: { $ref: "#/components/schemas/CatalogReferenceId" }
        sections:
          type: array
          maxItems: 200
          items: { $ref: "#/components/schemas/WorldbookSection" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        revision: { type: integer, minimum: 1 }
    MomentInput:
      type: object
      additionalProperties: false
      required: [body]
      properties:
        authorId: { type: string, minLength: 1, maxLength: 120, default: user }
        body: { type: string, minLength: 1, maxLength: 16000 }
        coverFileId:
          oneOf:
            - $ref: "#/components/schemas/CatalogReferenceId"
            - type: "null"
          default: null
    MomentCommentInput:
      type: object
      additionalProperties: false
      required: [text]
      properties:
        authorId: { type: string, minLength: 1, maxLength: 120, default: user }
        text: { type: string, minLength: 1, maxLength: 16000 }
        replyTo:
          oneOf:
            - type: string
              pattern: '^comment_[0-9a-f]{32}$'
            - type: "null"
          default: null
    MomentLikeInput:
      type: object
      additionalProperties: false
      required: [liked]
      properties:
        actorId: { type: string, minLength: 1, maxLength: 120, default: user }
        liked: { type: boolean }
    MomentComment:
      type: object
      additionalProperties: false
      required: [id, authorId, text, replyTo, createdAt, updatedAt]
      properties:
        id: { type: string, pattern: '^comment_[0-9a-f]{32}$' }
        authorId: { type: string, minLength: 1, maxLength: 120 }
        text: { type: string, minLength: 1, maxLength: 16000 }
        replyTo:
          oneOf:
            - type: string
              pattern: '^comment_[0-9a-f]{32}$'
            - type: "null"
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Moment:
      type: object
      additionalProperties: false
      required: [id, authorId, body, coverFileId, likedBy, comments, createdAt, updatedAt, revision]
      properties:
        id: { type: string, pattern: '^moment_[0-9a-f]{32}$' }
        authorId: { type: string, minLength: 1, maxLength: 120 }
        body: { type: string, minLength: 1, maxLength: 16000 }
        coverFileId:
          oneOf:
            - $ref: "#/components/schemas/CatalogReferenceId"
            - type: "null"
        likedBy:
          type: array
          uniqueItems: true
          items: { type: string, minLength: 1, maxLength: 120 }
        comments:
          type: array
          maxItems: 1000
          items: { $ref: "#/components/schemas/MomentComment" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        revision: { type: integer, minimum: 1 }
    WechatAccount:
      type: object
      additionalProperties: false
      description: Non-secret iLink account metadata. Bot credentials and derived keychain names are never returned.
      required: [id, note, online, createdAt, lastLoginAt, ilinkUserId, loginBaseUrl, credentialConfigured, linkedPersonaId]
      properties:
        id: { type: string, minLength: 1, maxLength: 256 }
        note: { type: string, maxLength: 320 }
        online: { type: boolean }
        createdAt: { type: string, format: date-time }
        lastLoginAt: { type: string, format: date-time }
        ilinkUserId: { type: string, maxLength: 256 }
        loginBaseUrl:
          type: string
          format: uri
          description: The validated official HTTPS origin used for the latest login.
        credentialConfigured: { type: boolean }
        linkedPersonaId:
          oneOf:
            - $ref: "#/components/schemas/PersonaIdValue"
            - type: "null"
          description: Profile Persona uniquely bound to this account, or null.
    WechatConfig:
      type: object
      additionalProperties: false
      required: [revision, baseUrl, timeoutSeconds, accounts]
      properties:
        revision: { type: string }
        baseUrl:
          type: string
          format: uri
          description: Official iLink HTTPS origin. Debug builds also allow an explicit loopback fixture.
        timeoutSeconds: { type: integer, minimum: 5, maximum: 60 }
        accounts:
          type: array
          maxItems: 16
          items: { $ref: "#/components/schemas/WechatAccount" }
    WechatConfigPatch:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        baseUrl: { type: string, format: uri }
        timeoutSeconds: { type: integer, minimum: 5, maximum: 60 }
    WechatQrStartRequest:
      type: object
      additionalProperties: false
      properties:
        baseUrl: { type: [string, "null"], format: uri }
    WechatQrStartResult:
      type: object
      additionalProperties: false
      required: [qrcode, qrImage, baseUrl]
      properties:
        qrcode: { type: string, minLength: 1, maxLength: 4096, writeOnly: true }
        qrImage:
          type: string
          pattern: "^data:image/svg\\+xml;base64,"
          description: QR SVG rendered locally from the upstream challenge content.
        baseUrl: { type: string, format: uri }
    WechatQrStatusRequest:
      type: object
      additionalProperties: false
      required: [qrcode]
      properties:
        qrcode: { type: string, minLength: 1, maxLength: 4096, writeOnly: true }
        baseUrl: { type: [string, "null"], format: uri }
    WechatQrStatusResult:
      type: object
      additionalProperties: false
      required: [status, message, account, host]
      properties:
        status: { type: string }
        message: { type: [string, "null"] }
        account:
          oneOf:
            - $ref: "#/components/schemas/WechatAccount"
            - type: "null"
        host: { type: [string, "null"] }
    WechatAccountLinkPatch:
      type: object
      additionalProperties: false
      required: [linkedPersonaId]
      properties:
        linkedPersonaId:
          oneOf:
            - $ref: "#/components/schemas/PersonaIdValue"
            - type: "null"
    WechatPollRequest:
      type: object
      additionalProperties: false
      properties:
        cursor: { type: [string, "null"], maxLength: 16384 }
    WechatInboundMessage:
      type: object
      additionalProperties: false
      required: [id, peer, text]
      properties:
        id: { type: string, minLength: 1, maxLength: 256 }
        peer: { type: string, minLength: 1, maxLength: 256 }
        text: { type: string, minLength: 1, maxLength: 16000 }
    WechatPollResult:
      type: object
      additionalProperties: false
      required: [messages, nextCursor, receivedCount, skippedCount]
      properties:
        messages:
          type: array
          maxItems: 100
          items: { $ref: "#/components/schemas/WechatInboundMessage" }
        nextCursor: { type: [string, "null"], maxLength: 16384 }
        receivedCount: { type: integer, minimum: 0, maximum: 100 }
        skippedCount: { type: integer, minimum: 0, maximum: 100 }
    WechatSendRequest:
      type: object
      additionalProperties: false
      required: [peer, text]
      properties:
        peer: { type: string, minLength: 1, maxLength: 256 }
        text: { type: string, minLength: 1, maxLength: 16000 }
    WechatSendResult:
      type: object
      additionalProperties: false
      required: [accepted, messageId]
      properties:
        accepted: { type: boolean, const: true }
        messageId: { type: [string, "null"], maxLength: 256 }
    Plugin:
      type: object
      additionalProperties: false
      required: [id, name, version, description, author, providedTools, requiresEnv, enabled, execution, installedAt, updatedAt]
      properties:
        id: { type: string, pattern: '^[a-z0-9][a-z0-9_.-]{0,63}$' }
        name: { type: string, minLength: 1, maxLength: 120 }
        version: { type: string, pattern: '^[A-Za-z0-9][A-Za-z0-9._+-]{0,63}$' }
        description: { type: string, maxLength: 4096 }
        author: { type: string, minLength: 1, maxLength: 120 }
        providedTools:
          type: array
          maxItems: 128
          uniqueItems: true
          items: { type: string, pattern: '^[A-Za-z0-9_.:-]{1,128}$' }
        requiresEnv:
          type: array
          maxItems: 128
          uniqueItems: true
          items: { type: string, pattern: '^[A-Z_][A-Z0-9_]{0,127}$' }
        enabled: { type: boolean }
        execution: { type: string, const: manifestOnly }
        installedAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    PluginPage:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          maxItems: 512
          items: { $ref: "#/components/schemas/Plugin" }
    InstallPlugin:
      type: object
      additionalProperties: false
      required: [sourcePath]
      properties:
        sourcePath:
          type: string
          minLength: 1
          maxLength: 4096
          description: A directory already present as a direct child of HERMES_HOME/.synthchat/plugins. Absolute paths must resolve to such a direct child; outside paths and traversal are rejected.
    PluginPatch:
      type: object
      additionalProperties: false
      required: [enabled]
      properties:
        enabled: { type: boolean }
    SecretStatus:
      type: object
      additionalProperties: false
      required: [name, configured, storage]
      properties:
        name: { $ref: "#/components/schemas/SecretName" }
        configured: { type: boolean }
        storage: { type: string, const: osKeychain }
        updatedAt: { type: [string, "null"], format: date-time }
    SecretName:
      type: string
      pattern: "^[A-Z][A-Z0-9_]{0,127}$"
    SecretValue:
      type: object
      additionalProperties: false
      required: [value]
      properties:
        value: { type: string, minLength: 1, maxLength: 2560, writeOnly: true }
    DiscoverModelsRequest:
      type: object
      additionalProperties: false
      required: [provider]
      properties:
        provider: { type: string }
        baseUrl:
          type: [string, "null"]
          format: uri
          pattern: "^[Hh][Tt][Tt][Pp][Ss]?://"
          description: Null selects the provider default. Non-null values require a host and forbid userinfo, query and fragment components.
    DiscoverModelsResponse:
      type: object
      additionalProperties: false
      required: [provider, models, cached]
      properties:
        provider: { type: string }
        models: { type: array, items: { type: string } }
        cached: { type: boolean }
    Usage:
      type: object
      additionalProperties: false
      required: [promptTokens, completionTokens, totalTokens]
      properties:
        promptTokens: { type: integer, minimum: 0 }
        completionTokens: { type: integer, minimum: 0 }
        totalTokens: { type: integer, minimum: 0 }
        cost: { type: [number, "null"], minimum: 0 }
    Session:
      type: object
      additionalProperties: false
      required: [id, profileId, personaId, title, preview, source, model, messageCount, archived, revision, createdAt, updatedAt, match]
      properties:
        id: { type: string }
        profileId: { $ref: "#/components/schemas/ProfileIdValue" }
        personaId:
          type: [string, "null"]
          pattern: '^persona_[0-9a-f]{32}$'
