openapi: 3.1.0
info:
  title: SynthChat Hermes Backend API
  version: 0.1.0
  description: |
    Frontend-facing contract for the complete Rust backend. Upstream Hermes
    HTTP, dashboard, WebSocket, CLI, filesystem and SQLite interfaces are
    compatibility references only and are not production runtime dependencies.
servers:
  - url: http://127.0.0.1:8642
    description: Local desktop backend
security:
  - bearerAuth: []
tags:
  - name: System
    description: Health, capabilities and startup snapshot.
  - name: Profiles
    description: Profiles, non-secret configuration, providers and keychain status.
  - name: Sessions
    description: Persisted Hermes sessions and message history.
  - name: Runs
    description: Chat run lifecycle, SSE, approval and cancellation.
  - name: Files
    description: Opaque file upload and retrieval.
  - name: Tools
    description: Dynamic Hermes toolset configuration.
  - name: Web
    description: Profile-scoped Rust web provider selection and readiness. Browser automation is a separate capability domain.
  - name: WeChat
    description: Profile-scoped QR login, keychain-backed account metadata and explicit bounded message polling/sending.
  - name: Catalog
    description: Profile-scoped Persona, Worldbook and Moment product data stored by the Rust backend.
  - name: Plugins
    description: Local manifest-only plugin registration and enablement. Registered plugin code is never executed.
  - name: Workspaces
    description: Opaque Profile-scoped registrations for user-approved local directory roots.
  - name: Skills
    description: Profile-scoped skill discovery and lifecycle.
  - name: Memory
    description: Capability-aware memory operations.
  - name: MCP
    description: Profile-scoped persistent MCP server configuration. Transport execution and discovery are not part of this slice.
paths:
  /health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Get backend health
      security: []
      responses:
        "200":
          description: Rust service is alive. Engine health is reported separately.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /api/v1/capabilities:
    get:
      tags: [System]
      operationId: getCapabilities
      summary: Get effective capabilities
      responses:
        "200":
          description: Effective frontend contract and implemented Rust engine capabilities.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capabilities"
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/bootstrap:
    get:
      tags: [System]
      operationId: getBootstrap
      summary: Get a consistent startup snapshot
      parameters:
        - name: sessionLimit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 30 }
      responses:
        "200":
          description: Consistent startup snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bootstrap"
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/providers:
    get:
      tags: [Profiles]
      operationId: listProviders
      summary: List provider catalog entries
      responses:
        "200":
          description: Provider catalog without credentials.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Provider" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/web/providers:
    get:
      tags: [Web]
      operationId: listWebProviders
      summary: List Rust web provider adapters
      responses:
        "200":
          description: Implemented Rust web provider catalog without credentials. The Web-first contract exposes Tavily only.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WebProvider" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/operations/{operationId}:
    parameters:
      - $ref: "#/components/parameters/OperationId"
    get:
      tags: [System]
      operationId: getOperation
      summary: Get asynchronous operation state
      responses:
        "200":
          description: Current operation state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Operation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Unprocessable" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/v1/plugins:
    get:
      tags: [Plugins]
      operationId: listPlugins
      summary: List registered local plugin manifests
      responses:
        "200":
          description: Bounded manifest-only plugin catalog and its strong catalog ETag.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PluginPage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Unprocessable" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/v1/plugins/install:
    post:
      tags: [Plugins]
      operationId: installPlugin
      summary: Register a bounded plugin.json already present in the local plugin directory
      description: Registration stores metadata only. It does not copy, import, load or execute plugin code.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InstallPlugin" }
      responses:
        "201":
          description: Local plugin manifest registered in a disabled state.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Plugin" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "413": { $ref: "#/components/responses/PayloadTooLarge" }
        "415": { $ref: "#/components/responses/UnsupportedMediaType" }
        "422": { $ref: "#/components/responses/Unprocessable" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/v1/plugins/{pluginId}:
    parameters:
      - $ref: "#/components/parameters/PluginId"
    patch:
      tags: [Plugins]
      operationId: updatePlugin
      summary: Enable or disable a registered plugin manifest
      description: Enablement is catalog metadata only and never authorizes plugin code execution.
      parameters:
        - $ref: "#/components/parameters/PluginIfMatch"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema: { $ref: "#/components/schemas/PluginPatch" }
      responses:
        "200":
          description: Updated manifest-only plugin registration.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Plugin" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "415": { $ref: "#/components/responses/UnsupportedMediaType" }
        "422": { $ref: "#/components/responses/Unprocessable" }
        "428": { $ref: "#/components/responses/PreconditionRequired" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
    delete:
      tags: [Plugins]
      operationId: uninstallPlugin
      summary: Remove a plugin registration without deleting its local directory
      parameters:
        - $ref: "#/components/parameters/PluginIfMatch"
      responses:
        "204":
          description: Registration removed; source files remain untouched.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "428": { $ref: "#/components/responses/PreconditionRequired" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/v1/profiles:
    get:
      tags: [Profiles]
      operationId: listProfiles
      summary: List profiles
      responses:
        "200":
          description: Profiles visible to this local installation.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Profile" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Profiles]
      operationId: createProfile
      summary: Create a profile
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProfile" }
      responses:
        "201":
          description: Profile created.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProfileMetadata" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/profiles/{profileId}:
    parameters:
      - $ref: "#/components/parameters/ProfileId"
    get:
      tags: [Profiles]
      operationId: getProfile
      summary: Get profile metadata
      responses:
        "200":
          description: Profile metadata.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProfileMetadata" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Profiles]
      operationId: updateProfile
      summary: Update profile metadata
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema: { $ref: "#/components/schemas/ProfilePatch" }
      responses:
        "200":
          description: Updated profile.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProfileMetadata" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "428": { $ref: "#/components/responses/PreconditionRequired" }
    delete:
      tags: [Profiles]
      operationId: deleteProfile
      summary: Delete a profile
      responses:
        "204": { description: Profile deleted or already absent. The default and active profiles cannot be deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/v1/profiles/{profileId}/active:
    parameters:
      - $ref: "#/components/parameters/ProfileId"
    put:
      tags: [Profiles]
      operationId: activateProfile
      summary: Activate a profile
      responses:
        "200":
          description: Active profile. Existing sessions and runs remain pinned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/profiles/{profileId}/config:
    parameters:
      - $ref: "#/components/parameters/ProfileId"
    get:
      tags: [Profiles]
      operationId: getProfileConfig
      summary: Get profile configuration
      responses:
        "200":
          description: Non-secret structured Hermes configuration.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProfileConfig" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Profiles]
      operationId: updateProfileConfig
      summary: Update profile configuration
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema: { $ref: "#/components/schemas/ProfileConfigPatch" }
      responses:
        "200":
          description: Updated non-secret configuration. Unknown YAML keys are preserved.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProfileConfig" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "428": { $ref: "#/components/responses/PreconditionRequired" }
  /api/v1/profiles/{profileId}/web:
    parameters:
      - $ref: "#/components/parameters/ProfileId"
    get:
      tags: [Web]
      operationId: getProfileWebConfig
      summary: Get Profile web provider configuration and readiness
      responses:
        "200":
          description: Non-secret Web configuration and effective per-tool readiness. ETag is the shared ProfileConfig revision.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebConfig" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
    patch:
      tags: [Web]
      operationId: updateProfileWebConfig
      summary: Update Profile web provider configuration
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema: { $ref: "#/components/schemas/WebConfigPatch" }
      responses:
        "200":
          description: Updated non-secret Web configuration. Unknown YAML fields are preserved and ETag is the resulting shared ProfileConfig revision.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebConfig" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "428": { $ref: "#/components/responses/PreconditionRequired" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/v1/profiles/{profileId}/wechat:
    parameters:
      - $ref: "#/components/parameters/ProfileId"
    get:
      tags: [WeChat]
      operationId: getWechatConfig
      summary: Get Profile WeChat configuration and account metadata
      responses:
        "200":
          description: Non-secret WeChat configuration. Account credentials remain in the OS keychain.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WechatConfig" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
    patch:
      tags: [WeChat]
      operationId: updateWechatConfig
      summary: Update Profile WeChat connection configuration
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema: { $ref: "#/components/schemas/WechatConfigPatch" }
      responses:
        "200":
          description: Updated non-secret WeChat configuration.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WechatConfig" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "428": { $ref: "#/components/responses/PreconditionRequired" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/v1/profiles/{profileId}/wechat/qr:
    parameters:
      - $ref: "#/components/parameters/ProfileId"
    post:
      tags: [WeChat]
      operationId: startWechatQr
      summary: Start a WeChat QR login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WechatQrStartRequest" }
      responses:
        "200":
          description: QR login challenge rendered by the local Rust backend.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WechatQrStartResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502": { $ref: "#/components/responses/BadGateway" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/v1/profiles/{profileId}/wechat/qr/status:
    parameters:
      - $ref: "#/components/parameters/ProfileId"
    post:
      tags: [WeChat]
      operationId: checkWechatQrStatus
      summary: Check a WeChat QR login challenge
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WechatQrStatusRequest" }
      responses:
        "200":
          description: QR status. A confirmed account returns only non-secret metadata and stores its bot credential in the OS keychain.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WechatQrStatusResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502": { $ref: "#/components/responses/BadGateway" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/v1/profiles/{profileId}/wechat/accounts/{accountId}:
    parameters:
      - $ref: "#/components/parameters/ProfileId"
      - $ref: "#/components/parameters/WechatAccountId"
    patch:
      tags: [WeChat]
      operationId: updateWechatAccountLink
      summary: Bind or unbind one Profile Persona to a WeChat account
      description: A Persona may be bound to at most one WeChat account in the same Profile.
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WechatAccountLinkPatch" }
      responses:
        "200":
          description: Updated non-secret account metadata and shared ProfileConfig ETag.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WechatConfig" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "415": { $ref: "#/components/responses/UnsupportedMediaType" }
        "428": { $ref: "#/components/responses/PreconditionRequired" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/v1/profiles/{profileId}/wechat/accounts/{accountId}/poll:
    parameters:
      - $ref: "#/components/parameters/ProfileId"
      - $ref: "#/components/parameters/WechatAccountId"
    post:
      tags: [WeChat]
      operationId: pollWechatMessages
      summary: Explicitly poll a bounded page of normalized inbound messages
      description: The client owns cursor persistence. This route does not create Sessions or Runs automatically.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WechatPollRequest" }
      responses:
        "200":
          description: At most 100 normalized text messages; unknown or unsafe upstream records are counted as skipped.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WechatPollResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "415": { $ref: "#/components/responses/UnsupportedMediaType" }
        "422": { $ref: "#/components/responses/Unprocessable" }
        "502": { $ref: "#/components/responses/BadGateway" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/v1/profiles/{profileId}/wechat/accounts/{accountId}/messages:
    parameters:
      - $ref: "#/components/parameters/ProfileId"
      - $ref: "#/components/parameters/WechatAccountId"
    post:
      tags: [WeChat]
      operationId: sendWechatMessage
      summary: Explicitly send one bounded text message
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WechatSendRequest" }
      responses:
        "200":
          description: Upstream accepted the message; no account credential or raw upstream response is returned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WechatSendResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "415": { $ref: "#/components/responses/UnsupportedMediaType" }
        "422": { $ref: "#/components/responses/Unprocessable" }
        "502": { $ref: "#/components/responses/BadGateway" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/v1/profiles/{profileId}/personas:
    parameters:
      - $ref: "#/components/parameters/ProfileId"
    get:
      tags: [Catalog]
      operationId: listPersonas
      summary: List Profile Personas
      parameters:
        - $ref: "#/components/parameters/ProductSearchQuery"
      responses:
        "200":
          description: At most 2,000 Personas ordered by updatedAt descending and ID ascending. The optional query searches names and serialized Persona fields case-insensitively.
          content:
            application/json:
              schema:
                type: array
                maxItems: 2000
                items: { $ref: "#/components/schemas/Persona" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ProductNotFound" }
        "503": { $ref: "#/components/responses/ProductCatalogUnavailable" }
    post:
      tags: [Catalog]
      operationId: createPersona
      summary: Create a Persona
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PersonaInput" }
      responses:
        "201":
          description: Created Persona. ETag is `"product-persona-1"`.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Persona" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ProductNotFound" }
        "413": { $ref: "#/components/responses/ProductCatalogLimit" }
        "415": { $ref: "#/components/responses/UnsupportedMediaType" }
        "503": { $ref: "#/components/responses/ProductCatalogUnavailable" }
  /api/v1/profiles/{profileId}/personas/{personaId}:
    parameters:
      - $ref: "#/components/parameters/ProfileId"
      - $ref: "#/components/parameters/PersonaId"
    get:
      tags: [Catalog]
      operationId: getPersona
      summary: Get a Persona
      responses:
        "200":
          description: Persona snapshot with the strong product ETag required by mutations.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Persona" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ProductNotFound" }
        "503": { $ref: "#/components/responses/ProductCatalogUnavailable" }
    patch:
      tags: [Catalog]
      operationId: updatePersona
      summary: Replace Persona input fields using strong ETag concurrency control
      description: This is not JSON Merge Patch. Omitted fields take their PersonaInput defaults.
      parameters:
        - $ref: "#/components/parameters/PersonaIfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PersonaInput" }
      responses:
        "200":
          description: Updated Persona with its incremented strong product ETag.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Persona" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
