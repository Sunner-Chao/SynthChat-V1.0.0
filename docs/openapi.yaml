        "503": { $ref: "#/components/responses/SessionStorageUnavailable" }
    post:
      tags: [Sessions]
      operationId: importHermesV21Sessions
      summary: Atomically import the previewed Hermes v21 snapshot
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HermesImportRequest" }
      responses:
        "200":
          description: The complete snapshot was imported, was already present, or this idempotent result was replayed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HermesImportResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Idempotency/source conflict, or a bounded atomic-import conflict report.
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Problem"
                  - $ref: "#/components/schemas/HermesImportConflictProblem"
        "413": { $ref: "#/components/responses/PayloadTooLarge" }
        "422": { $ref: "#/components/responses/Unprocessable" }
        "503": { $ref: "#/components/responses/SessionStorageUnavailable" }
