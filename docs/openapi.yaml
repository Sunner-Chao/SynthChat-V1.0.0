        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "428": { $ref: "#/components/responses/PreconditionRequired" }
  /api/v1/profiles/{profileId}/skills:
    parameters:
      - $ref: "#/components/parameters/ProfileId"
    get:
      tags: [Skills]
      operationId: listSkills
      summary: List installed skills
      parameters:
        - { name: q, in: query, schema: { type: string, maxLength: 500 } }
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Installed skills for a profile. ETag combines the current ProfileConfig revision with the complete unfiltered installed-skill catalog and is used by Skill PATCH.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SkillPage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/profiles/{profileId}/skills/install:
