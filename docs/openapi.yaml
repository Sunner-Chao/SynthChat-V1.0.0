      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Uninstall operation started.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Operation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Unprocessable" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/v1/profiles/{profileId}/memories:
    parameters:
      - $ref: "#/components/parameters/ProfileId"
    get:
      tags: [Memory]
      operationId: listMemories
      summary: List memory items
      parameters:
        - name: target
          in: query
          required: true
          description: Selects one canonical builtin Markdown target. Statistics and revision are scoped to this target.
          schema: { type: string, enum: [memory, user] }
        - { name: q, in: query, required: false, schema: { type: string, maxLength: 500 } }
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
