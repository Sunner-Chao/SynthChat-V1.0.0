          application/merge-patch+json:
            schema: { $ref: "#/components/schemas/ToolsetPatch" }
      responses:
        "200":
          description: Updated toolset. ETag is the resulting ProfileConfig revision; an enablement no-op returns the unchanged revision.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
